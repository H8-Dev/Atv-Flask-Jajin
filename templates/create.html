{% extends 'base.html' %}
{% block titulo %}
    <title>Criar Jogo</title>
{% endblock %}


{% block conteudo%}
<h2>Cadastrar Novo Jogo</h2>
<form action="/jogos/criar" method="POST">
    <label>Nome: <input type="text" name="nome" required> </label><br>
    <label>Gênero: <input type="text" name="genero" required> </label><br>
    <label>Preço: <input type="text" name="preco" required></label><br>
    <button type="submit">Criar</button>
</form>

{% endblock %}
